        .todo-item { display: flex; align-items: flex-start; padding: 14px 0; border-bottom: 1px dashed #e9ecef; }
        .todo-item:last-child { border-bottom: none; }

        label { cursor: pointer; display: flex; flex-direction: column; gap: 6px; flex-grow: 1; }
        input[type="checkbox"]:checked + label .task-text { text-decoration: line-through; color: #adb5bd; }

        .tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; color: #fff; }

        .tag.화학 { background: var(--화학); }

        .tag.국어 { background: var(--language); }
        .tag.영어 { background: #5c7cfa; }
        .tag.복습 { background: var(--review); }
        
        .time-slot { font-size: 0.75rem; color: #495057; background: #e9ecef; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .task-text { font-size: 0.95rem; color: #343a40; line-height: 1.45; font-weight: 500; }

    const container = document.getElementById('accordion-container');

    data.forEach((day, dayIdx) => {

        item.className = 'accordion-item';
        
        let badge = '';
        if (day.exam) badge = `<span class="badge exam">${day.exam}</span>`;
        else if (day.academy) badge = `<span class="badge academy">${day.academy}</span>`;
        
        item.innerHTML = `
            <div class="accordion-header" onclick="toggleAccordion(this)">
                <div class="date-info">
                    <span class="date-text">${day.date}</span>
                    ${badge}
                </div>
                <span class="icon">▼</span>
            </div>
            <div class="accordion-content">
                <ul class="todo-list">
                    ${day.tasks.map((task, taskIdx) => {
                        const id = `task-${dayIdx}-${taskIdx}`;
                        return `
                            <li class="todo-item">
                                <input type="checkbox" id="${id}" onchange="saveStatus('${id}')">
                                <label for="${id}">
                                    <div class="tags">
                                        <span class="time-slot">${task.slot}</span>
                                        <span class="tag ${task.subj}">${task.subj}</span>
                                    </div>
                                    <div class="task-text">${task.txt}</div>
                                </label>
                            </li>
                        `;
                    }).join('')}
                </ul>
            </div>
        `;
        container.appendChild(item);
    });

        const item = header.parentElement;
        const content = header.nextElementSibling;
        
        if (item.classList.contains('active')) {
            item.classList.remove('active');
            content.style.maxHeight = null;
        } else {
            document.querySelectorAll('.accordion-item').forEach(el => {
                el.classList.remove('active');
                el.querySelector('.accordion-content').style.maxHeight = null;
            });
            item.classList.add('active');
            content.style.maxHeight = content.scrollHeight + "px";
        }
    }

    function saveStatus(id) {
        const checkbox = document.getElementById(id);
        localStorage.setItem(id, checkbox.checked);
    }

    window.onload = function() {
        document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            const saved = localStorage.getItem(checkbox.id);
            if (saved === 'true') {
                checkbox.checked = true;
            }
        });
    }
</script>
</body>
</html>
